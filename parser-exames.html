<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parser Exames - Estilo Evolução</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        h3 {
            color: #555;
            margin-top: 25px;
            margin-bottom: 10px;
            font-size: 16px;
            border-left: 4px solid #667eea;
            padding-left: 10px;
        }
        
        textarea {
            width: 100%;
            height: 250px;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
            transition: border-color 0.3s;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 15px;
            margin-bottom: 25px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        #output {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 6px;
            border-left: 4px solid #28a745;
            min-height: 60px;
            line-height: 1.8;
            color: #333;
            font-size: 14px;
            word-break: break-word;
        }
        
        .empty-output {
            color: #999;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔬 Parser de Exames</h1>
        <p class="subtitle">Estilo Evolução - Prefeitura SP</p>
        
        <h3>📋 Input (Cole o texto dos resultados)</h3>
        <textarea id="input" placeholder="Cole aqui os resultados dos exames da Prefeitura SP..."></textarea>
        <button onclick="processar()">▶ Gerar Evolução</button>
        
        <h3>✅ Output</h3>
        <div id="output" class="empty-output">Os resultados aparecerão aqui...</div>
    </div>

    <script>
        function getValue(text, regex) {
            let match = text.match(regex);
            return match ? match[1].replace(",", ".") : null;
        }

        function flag(text, regex) {
            let match = text.match(regex);
            return match && match[2] === "*" ? "↑" : "";
        }

        function processar() {
            let t = document.getElementById("input").value;
            
            if (!t.trim()) {
                document.getElementById("output").innerHTML = '<span class="empty-output">Por favor, cole o texto dos resultados dos exames.</span>';
                return;
            }
            
            let out = [];
            
            function add(label, value) {
                if (value) out.push(label + " " + value);
            }

            add("Ac úrico", getValue(t, /ACIDO URICO\s+([\d,]+)/));
            add("B12", getValue(t, /VITAMINA B1\s+([\d,]+)/));
            add("Ca", getValue(t, /CALCIO\s+([\d,]+)/));
            add("ColT", getValue(t, /COLESTEROL\s+([\d,]+)/));
            
            let cpk = getValue(t, /CPK[\s\S]*?RESULTADO\s+([\d,]+)/);
            let cpkFlag = flag(t, /(CPK[\s\S]*?RESULTADO\s+([\d,]+))[\s\S]*?(\*)/);
            if (cpk) out.push("CPK " + cpk + cpkFlag);
            
            let creat = getValue(t, /CREATININA\s+([\d,]+)/);
            let tfg = getValue(t, /TGF\s+([>\d,]+)/);
            if (creat) out.push("Creat " + creat + (tfg ? " (TFGe " + tfg + ")" : ""));
            
            add("Glic", getValue(t, /GLI[\s\S]*?RESULTADO\s+([\d,]+)/));
            add("HDL", getValue(t, /HDL[\s\S]*?RESULTADO\s+([\d,]+)/));
            
            let hba1c = getValue(t, /HGL\s+([\d,]+)/);
            let eag = getValue(t, /GLICOSE ESTIMADA\s+([\d,]+)/);
            if (hba1c) out.push("HbA1c " + hba1c + (eag ? " (eAG " + eag + ")" : ""));
            
            add("LDL", getValue(t, /LDL[\s\S]*?RESULTADO\s+([\d,]+)/));
            
            let mau = getValue(t, /RELAÇÃO\s+([\d,]+)/);
            if (mau) out.push("MAU " + mau);
            
            add("PSA", getValue(t, /PSA[\s\S]*?RESULTADO\s+([\d,]+)/));
            
            let so = getValue(t, /SANGUE OCULTO\s+(NEG|POS)/i);
            if (so) out.push("SO " + (so.toUpperCase() === "NEG" ? "neg" : "pos"));
            
            add("Na", getValue(t, /SOD\s+([\d,]+)/));
            add("T4L", getValue(t, /T4L[\s\S]*?RESULTADO\s+([\d,]+)/));
            
            let tgo = getValue(t, /TGO\s+([\d,]+)/);
            let tgoFlag = flag(t, /(TGO\s+([\d,]+))[\s\S]*?(\*)/);
            if (tgo) out.push("TGO " + tgo + tgoFlag);
            
            let tgp = getValue(t, /TGP[\s\S]*?RESULTADO\s+([\d,]+)/);
            let tgpFlag = flag(t, /(TGP[\s\S]*?RESULTADO\s+([\d,]+))[\s\S]*?(\*)/);
            if (tgp) out.push("TGP " + tgp + tgpFlag);
            
            add("TG", getValue(t, /TRIGLICERIDES[\s\S]*?RESULTADO\s+([\d,]+)/));
            add("TSH", getValue(t, /TSH[\s\S]*?RESULTADO\s+([\d,]+)/));
            add("Ur", getValue(t, /URE[\s\S]*?RESULTADO\s+([\d,]+)/));
            
            // Urina tipo I
            let ph = getValue(t, /PH\s+([\d,]+)/);
            let dens = getValue(t, /DENSIDADE\s+([\d,]+)/);
            let prot = getValue(t, /PROTEÍNAS\s+(\w+)/);
            let nit = getValue(t, /NITRITO\s+(NEGATIVO|POSITIVO)/);
            let leuco = getValue(t, /LEUCOCITOS\s+([\d,]+)/);
            let hem = getValue(t, /HEMÁCIAS\s+([\d,]+)/);
            let bact = getValue(t, /BACTÉRIAS\s+([>\d\.]+)/);
            
            if (ph || dens) {
                out.push("U1 pH " + (ph || "-") + " - Dens " + (dens || "-") + " - Prot " + (prot ? prot.toLowerCase() : "-") + " - Nit " + (nit ? (nit.toLowerCase().includes("neg") ? "neg" : "pos") : "-") + " - Leuco " + (leuco || "-") + " - Hem " + (hem || "-") + " - Bact " + (bact || "-") );
            }
            
            add("VitD", getValue(t, /VITD3\s+([\d,]+)/));
            
            let hoje = new Date();
            let data = hoje.toLocaleDateString('pt-BR');
            
            if (out.length === 0) {
                document.getElementById("output").innerHTML = '<span class="empty-output">Nenhum resultado foi encontrado. Verifique o formato do texto.</span>';
            } else {
                document.getElementById("output").innerHTML = "📅 <strong>" + data + "</strong><br>━━━━━━━━━━━━━━━━━<br>- " + out.join(" | ");
            }
        }
        
        // Permitir processar com Enter
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('input').addEventListener('keydown', function(e) {
                if (e.ctrlKey && e.key === 'Enter') {
                    processar();
                }
            });
        });
    </script>
</body>
</html>
