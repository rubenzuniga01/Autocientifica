<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parser Exames - Estilo Evolução</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
            text-align: center;
        }
        .logo {
            max-width: 120px;
            margin: 0 auto 15px;
        }
        h1 { color: #333; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
        h3 {
            color: #555;
            margin-top: 25px;
            margin-bottom: 10px;
            font-size: 16px;
            border-left: 4px solid #667eea;
            padding-left: 10px;
            text-align: left;
        }
        textarea {
            width: 100%;
            height: 250px;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
            transition: border-color 0.3s;
        }
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 15px;
            margin-bottom: 25px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        button:active { transform: translateY(0); }
        #output {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 6px;
            border-left: 4px solid #28a745;
            min-height: 60px;
            line-height: 1.8;
            color: #333;
            font-size: 14px;
            word-break: break-word;
        }
        .empty-output { color: #999; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <img src="png-transparent-albert-einstein-hd-logo.png" alt="Logo da Empresa" class="logo">
        <h1>🔬 Parser de Exames</h1>
        <p class="subtitle">Estilo Evolução - Prefeitura SP</p>

        <h3>📋 Input (Cole o texto dos resultados)</h3>
        <textarea id="input" placeholder="Cole aqui os resultados dos exames da Prefeitura SP..."></textarea>
        <button onclick="processar()">▶ Gerar Evolução</button>

        <h3>✅ Output</h3>
        <div id="output" class="empty-output">Os resultados aparecerão aqui...</div>
    </div>

<script>
function getBlock(text, start) {
    let regex = new RegExp(start + "[\\s\\S]*?(?=\\n[A-Z]{3} -|$)");
    let match = text.match(regex);
    return match ? match[0] : "";
}

function getValue(text, regex) {
    let match = text.match(regex);
    return match ? match[1].replace(",", ".") : null;
}

function flag(text, regex) {
    let match = text.match(regex);
    return match && match[2] === "*" ? "↑" : "";
}

function processar() {
    let t = document.getElementById("input").value;
    let out = [];

    function add(label, value) { if (value) out.push(label + " " + value); }

    // ===== HEMOGRAMA =====
    let hem = getBlock(t, "HEM - HEMOGRAMA");
    if (hem) {
        let hb = getValue(hem, /HEMOGLOBINA\s+([\d,]+)/);
        let ht = getValue(hem, /HEMATOCRITO\s+([\d,]+)/);
        let leuco = getValue(hem, /LEUCOCITOS\s+([\d,]+)/);
        let plaq = getValue(hem, /PLAQUETAS\s+([\d,]+)/);
        if (hb || ht || leuco || plaq) {
            out.push(
                "Hemograma Hb " + (hb || "-") +
                " | Ht " + (ht || "-") +
                " | Leuco " + (leuco || "-") +
                " | Plaq " + (plaq || "-")
            );
        }
    }

    // ===== URINA TIPO I =====
    let uri = getBlock(t, "URI - URINA TIPO I");
    if (uri) {
        let ph = getValue(uri, /PH\s+([\d,]+)/);
        let dens = getValue(uri, /DENSIDADE\s+([\d,]+)/);
        let prot = getValue(uri, /PROTEÍNAS\s+(\w+)/);
        let nit = getValue(uri, /NITRITO\s+(NEGATIVO|POSITIVO)/i);
        let leuco = getValue(uri, /LEUCOCITOS\s+([\d,]+)/);
        let hemac = getValue(uri, /HEMÁCIAS\s+([\d,]+)/);
        let bact = getValue(uri, /BACTÉRIAS\s+([<>\d\.]+)/);

        out.push(
            "U1 pH " + (ph || "-") +
            " - Dens " + (dens || "-") +
            " - Prot " + (prot ? prot.toLowerCase() : "-") +
            " - Nit " + (nit ? (nit.toLowerCase().includes("neg") ? "neg" : "pos") : "-") +
            " - Leuco " + (leuco || "-") +
            " - Hem " + (hemac || "-") +
            " - Bact " + (bact || "-")
        );
    }

    // ===== EXAMES ADICIONAIS =====
    add("VitB12", getValue(t, /VITAMINA B12\s+([\d,]+)/));
    add("VitB1", getValue(t, /VITAMINA B1\s+([\d,]+)/));
    add("VitD3", getValue(t, /VITD3\s+([\d,]+)/));
    add("TGO", getValue(t, /TGO\s+([\d,]+)/));
    add("TGP", getValue(t, /TGP[\s\S]*?RESULTADO\s+([\d,]+)/));
    add("T4L", getValue(t, /T4L[\s\S]*?RESULTADO\s+([\d,]+)/));
    add("PSA", getValue(t, /PSA[\s\S]*?RESULTADO\s+([\d,]+)/));
    add("MAU", getValue(t, /RELAÇÃO\s+([\d,]+)/));
    add("Glic", getValue(t, /GLI[\s\S]*?RESULTADO\s+([\d,]+)/));
    add("HDL", getValue(t, /HDL[\s\S]*?RESULTADO\s+([\d,]+)/));
    add("LDL", getValue(t, /LDL[\s\S]*?RESULTADO\s+([\d,]+)/));
    add("TG", getValue(t, /TRIGLICERIDES[\s\S]*?RESULTADO\s+([\d,]+)/));
    add("TSH", getValue(t, /TSH[\s\S]*?RESULTADO\s+([\d,]+)/));
    add("Ur", getValue(t, /URE[\s\S]*?RESULTADO\s+([\d,]+)/));

    let hoje = new Date();
    let data = hoje.toLocaleDateString('pt-BR');

    document.getElementById("output").innerText =
        "- " + data + ": " + (out.length ? out.join(" | ") : "Nenhum resultado encontrado");
}
</script>
</body>
</html>
